name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  # Kept separate from build so a lint failure reads as a lint failure rather than as a
  # broken build, and so it reports in ~2 minutes instead of waiting on the matrix.
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      # golangci-lint type-checks, so it needs what the package needs to compile.
      - name: Install webview build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          printf 'Name: webkit2gtk-4.0\nDescription: Shim onto webkit2gtk-4.1\nVersion: 2.44.0\nRequires: webkit2gtk-4.1\n' \
            | sudo tee /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc >/dev/null

      - name: Cache pinned downloads
        uses: actions/cache@v4
        with:
          path: |
            bin
            .cache
          key: pinned-frankenphp-linux-x86_64-${{ hashFiles('Makefile') }}

      # phpstan reads app/adminer.php for adminer's own symbols, so the downloads have
      # to be in place before it can say anything useful.
      - run: make fetch FRANKEN_ASSET=frankenphp-linux-x86_64

      # php syntax and style, phpstan, golangci-lint, gofmt, go vet, shell syntax.
      - run: make qa FRANKEN_ASSET=frankenphp-linux-x86_64

      # shellcheck is already on the runner and says far more than `sh -n` does.
      - run: shellcheck check-stream.sh

      # Security rules for php, go and leaked secrets. Docker is on the runner, so this
      # needs nothing installed.
      - run: make security

  build:
    strategy:
      # One red platform should not hide the state of the other two.
      fail-fast: false
      matrix:
        include:
          # macos-15 runners are Apple Silicon, matching frankenphp-mac-arm64. On an
          # Intel runner the downloaded binary would be the wrong architecture.
          - os: macos-15
            asset: frankenphp-mac-arm64
            package: zip
            artifact: adminer-desktop-macos-arm64
            path: build/Adminer Desktop.zip
          - os: ubuntu-24.04
            asset: frankenphp-linux-x86_64
            package: tarball
            artifact: adminer-desktop-linux-x86_64
            path: build/adminer-desktop-linux.tar.gz
          - os: windows-2025
            asset: frankenphp-windows-x86_64.zip
            package: winzip
            artifact: adminer-desktop-windows-x86_64
            path: build/adminer-desktop-windows.zip

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # The Makefile is written for a POSIX shell; bash ships with the windows runner.
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum

      # webview is cgo, and on linux that means the system GTK and WebKit headers. macOS
      # and windows get theirs from the platform SDK and WebView2, already on the runner.
      - name: Install webview build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # webview_go hardcodes `pkg-config webkit2gtk-4.0`, which ubuntu 24.04 no longer
          # ships -- 4.1 is the same API over libsoup3. A .pc that just requires 4.1 keeps
          # us on a current runner instead of pinning to an ubuntu that is on its way out.
          printf 'Name: webkit2gtk-4.0\nDescription: Shim onto webkit2gtk-4.1\nVersion: 2.44.0\nRequires: webkit2gtk-4.1\n' \
            | sudo tee /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc >/dev/null

      # frankenphp is a ~180 MB download. It is pinned, so the key only has to change
      # when the pinned version does.
      - name: Cache pinned downloads
        uses: actions/cache@v4
        with:
          path: |
            bin
            .cache
          key: pinned-${{ matrix.asset }}-${{ hashFiles('Makefile') }}

      - run: make fetch FRANKEN_ASSET=${{ matrix.asset }}

      # Before anything else: a mismatch means the release was re-uploaded or the
      # download was tampered with, and neither should reach a build.
      - run: make verify FRANKEN_ASSET=${{ matrix.asset }}

      - run: make qa FRANKEN_ASSET=${{ matrix.asset }}

      # ~2 minutes, and deliberately not shortened. The point is to outlast the ordinary
      # 60s server write timeout, so a faster run would stop proving the thing it exists
      # to prove.
      - run: make check FRANKEN_ASSET=${{ matrix.asset }}

      - run: make ${{ matrix.package }} FRANKEN_ASSET=${{ matrix.asset }}

      # All unsigned: macOS needs right-click > Open on first launch, and Windows shows a
      # SmartScreen warning. Signing needs paid certificates held as repository secrets.
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
