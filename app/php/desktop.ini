; PHP settings for the desktop app. Loaded via PHP_INI_SCAN_DIR, which the launcher
; points here, because frankenphp's defaults leave errors nowhere useful.

; Without this a fatal error goes to the page and nowhere else -- so the log file, the
; one place a user is told to look, never sees it. On means it reaches frankenphp's
; logger, which is stderr, which is the log file.
log_errors = On

; Empty on purpose: PHP then hands the message to the SAPI's own logger rather than
; writing a file of its own that nothing would ever open.
error_log =

; Kept on. This is a local single-user tool, so an error belongs on screen where it is
; noticed rather than only in a file nobody is watching.
display_errors = On

; No import limits. PHP's server defaults (2M upload, 8M post) exist to stop strangers
; filling a shared host's disk; here the file is already on the user's own disk, so the
; only thing they ever do is refuse an ordinary dump with "Increase upload_max_filesize".

; 0 is PHP's documented "no limit" for the request body as a whole.
post_max_size = 0

; ponytail: 1024G rather than 0, which is also unlimited to PHP but is handed to
; adminer's own client-side check (include/html.inc.php:192) as a plain number -- and
; every file is larger than zero, so the browser would reject uploads PHP would accept.
; Ceiling is 16E (the value is a signed 64-bit byte count); raise it if disks catch up.
upload_max_filesize = 1024G
max_file_uploads = 1000

; -1 is unlimited. Adminer holds the whole SQL file in memory and doubles it while
; splitting statements, and sql.inc.php:45 leaves -1 alone rather than lowering it.
; The trade: a runaway import now takes the machine's memory instead of failing early.
memory_limit = -1

; No unlimited value exists, so a number nothing reaches. Adminer posts one field per
; column per row, so a wide table edited in bulk passes the 1000 default and the token
; check then fails with a misleading "invalid CSRF token".
max_input_vars = 1000000
